[build]
  command = "next build"
    publish = ".next"

    [[plugins]]
      package = "@netlify/plugin-nextjs"

      [[headers]]
        for = "/_next/static/*"
          [headers.values]
              Cache-Control = "public, max-age=31536000, immutable"

              [[headers]]
                for = "/images/*"
                  [headers.values]
                      Cache-Control = "public, max-age=31536000, immutable"

                      [[headers]]
                        for = "/*.svg"
                          [headers.values]
                              Cache-Control = "public, max-age=31536000, immutable"

                              [[headers]]
                                for = "/*.ico"
                                  [headers.values]
                                      Cache-Control = "public, max-age=86400"
                                      
